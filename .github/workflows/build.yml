name: 📱 Build APK from Phone

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Download code
        uses: actions/checkout@v4
      
      - name: ☕ Install Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      
      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      
      - name: 🚀 Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Asset-Pro
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
      
      - name: ✅ Build Complete
        run: echo "APK is ready! Download from Artifacts"
